<svg viewBox="0 0 40 36" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <clipPath id="b">
      <polygon points="2,17 9,11 9,23"/>
      <ellipse cx="17" cy="19" rx="10" ry="7"/>
      <circle cx="28" cy="13" r="6"/>
    </clipPath>
  </defs>
  <!-- Tail -->
  <polygon points="2,17 9,11 9,23" fill="#0E6B6B"/>
